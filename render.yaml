# ──────────────────────────────────────────────────────────────
# Render.yaml — Vente GDJ EEBC
# ──────────────────────────────────────────────────────────────
# OPTION A (par défaut) : base PostgreSQL interne Render
#   → Décommentez la section "databases" ci-dessous
#   → Utilisez "fromDatabase" pour DATABASE_URL
#
# OPTION B : base externe Supabase
#   → Commentez la section "databases"
#   → Remplacez DATABASE_URL par la valeur manuelle Supabase
#   → Format : postgresql://postgres.XXX:password@host:5432/postgres
# ──────────────────────────────────────────────────────────────

# OPTION A — Base PostgreSQL Render (décommenter pour utiliser)
databases:
  - name: vente-gdj-eebc-db
    databaseName: vente_gdj_eebc
    plan: free

services:
  - type: web
    name: vente-gdj-eebc
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://vente-gdj-eebc.onrender.com"
      # OPTION A — Base Render interne
      - key: DATABASE_URL
        fromDatabase:
          name: vente-gdj-eebc-db
          property: connectionString
      # OPTION B — Base Supabase externe (remplacer ci-dessus par) :
      # - key: DATABASE_URL
      #   value: "postgresql://postgres.XXXXXXXX:PASSWORD@aws-0-us-east-1.pooler.supabase.com:5432/postgres"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEFAULT_ADMIN_USERNAME
        value: "admin"
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: DEFAULT_CAISSE_USERNAME
        value: "caisse"
      - key: DEFAULT_CAISSE_PASSWORD
        generateValue: true
      - key: DEFAULT_PREPARATION_USERNAME
        value: "preparation"
      - key: DEFAULT_PREPARATION_PASSWORD
        generateValue: true
