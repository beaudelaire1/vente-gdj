{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Vente GDJ EEBC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
</head>
<body class="login-body">

<div class="login-wrapper" x-data="{ show: false }" x-init="setTimeout(() => show = true, 50)">
    <div class="login-card" x-show="show"
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0">

        <div class="login-header">
            <h1 class="login-brand">
                <span class="brand-accent">Vente</span> GDJ EEBC
            </h1>
            <p class="login-subtitle">Système de gestion</p>
        </div>

        {% if error %}
        <div class="login-error" x-data="{ show: true }" x-show="show"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Identifiant</label>
                <input type="text" id="username" name="username" class="form-input"
                       autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-input"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Se connecter
            </button>
        </form>

        <div class="login-footer">
            <span class="login-footer-text">Restaurant Éphémère</span>
        </div>
    </div>
</div>

</body>
</html>
